services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mysecretpassword}
      POSTGRES_DB: ${POSTGRES_DB:-TimeWarden}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: TimeWarden.API/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5062
      ConnectionStrings__DefaultConnection: "User ID=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-mysecretpassword};Host=db;Port=5432;Database=${POSTGRES_DB:-TimeWarden};Include Error Detail=true"
      JWT__Key: ${JWT_KEY:-ChangeME123!ChangeME123!VeryLongSecure64CharTokenChangeME!!!ChangeME123!ChangeME123!VeryLongSecure64CharTokenChangeME!!!ChangeME123!ChangeME123!VeryLongSecure64CharTokenChangeME!!!}
      JWT__Issuer: ${JWT_ISSUER:-http://localhost}
      JWT__Audience: ${JWT_AUDIENCE:-http://localhost}
      JWT__TokenLifetime: ${JWT_TOKEN_LIFETIME:-120}
      CORS__AllowedOrigins: ${CORS_ORIGINS:-http://localhost}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_PORT:-5062}:5062"

  client-build:
    build:
      context: ./TimeWarden.Client/timewarden-client
      dockerfile: Dockerfile
    volumes:
      - ${CLIENT_OUTPUT:-./client-dist}:/output

volumes:
  pgdata:
